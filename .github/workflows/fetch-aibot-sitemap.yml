name: Fetch ai-bot.cn Sitemap

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call ai-bot sitemap endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/aibot-sitemap"

name: Cluster Events

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:

jobs:
  cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Cluster recent articles into event drafts
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/cluster-events"

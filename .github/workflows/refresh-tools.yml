name: Refresh Tool Candidates

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call refresh-tools endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/refresh-tools"

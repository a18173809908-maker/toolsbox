name: Repo Spotlight

on:
  schedule:
    - cron: '0 6 * * 1'   # weekly Monday 06:00 UTC
  workflow_dispatch:

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
  LLM_MODEL: ${{ secrets.LLM_MODEL }}
  LLM_MODEL_PREMIUM: ${{ secrets.LLM_MODEL_PREMIUM }}
  YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

jobs:
  spotlight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check env vars
        run: |
          echo "DATABASE_URL set: ${{ secrets.DATABASE_URL != '' }}"
          echo "DEEPSEEK_API_KEY set: ${{ secrets.DEEPSEEK_API_KEY != '' }}"
          echo "LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}"
          echo "LLM_MODEL: ${{ secrets.LLM_MODEL }}"

      - name: Test DeepSeek API
        run: |
          npx tsx -e "
          import { chat } from './lib/llm/index.ts';
          void (async () => {
            try {
              const r = await chat([{ role: 'user', content: '回复OK' }], { maxTokens: 10 });
              console.log('DeepSeek OK:', r);
            } catch(e) {
              console.error('DeepSeek FAILED:', e);
              process.exit(1);
            }
          })();
          "

      - name: Generate repo spotlights
        run: npx tsx scripts/spotlight-repos.ts

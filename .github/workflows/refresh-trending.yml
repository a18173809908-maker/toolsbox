name: Refresh GitHub Trending

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
  LLM_MODEL: ${{ secrets.LLM_MODEL }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh trending + translate
        run: |
          npx tsx scripts/fetch-trending.ts
          npx tsx scripts/translate-trending.ts

      - name: Enhance trending insights (today)
        run: npx tsx scripts/enhance-trending.ts today
        continue-on-error: true
